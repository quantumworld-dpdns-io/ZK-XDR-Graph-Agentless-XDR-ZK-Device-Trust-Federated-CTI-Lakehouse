        indicator_id:
          type: string
        type:
          type: string
        value:
          type: string
        confidence:
          type: integer
        source:
          type: string
        tlp:
          type: string
        first_seen:
          type: string
          format: date-time
          nullable: true
        last_seen:
          type: string
          format: date-time
          nullable: true
        tags:
          type: array
          items:
            type: string
        description:
          type: string
        is_active:
          type: boolean
