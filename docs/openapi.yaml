          example: "203.0.113.50"
        threat:
          type: string
          description: Threat description
        severity:
          type: string
          enum: [low, medium, high, critical]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        source:
          type: string
        tlp:
          type: string
          enum: [white, green, amber, red]
          default: amber
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        mitre_tactics:
          type: array
          items:
            type: string

