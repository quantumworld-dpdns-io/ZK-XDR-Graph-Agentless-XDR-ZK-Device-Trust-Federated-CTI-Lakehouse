services:
  # PostgreSQL - Primary relational database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zdxdr
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: zdxdr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zdxdr"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Event stream, cache, rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j - Asset graph database
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./infra/neo4j/init.cypher:/data/init.cypher

  # ClickHouse - Hot analytics for security events
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/migrations:/docker-entrypoint-initdb.d

  # MinIO - Object storage for evidence and CTI bundles
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio_data:/data

  # Qdrant - Vector database for CTI embeddings
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Redpanda - Event streaming (Kafka-compatible, lighter than Kafka)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=256M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda

  # API Gateway - Go backend
  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      GO_ENV: development
      GO_PORT: "8080"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: zdxdr
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: zdxdr
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      MINIO_ENDPOINT: minio:9000
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      JWT_SECRET: change-me-in-production
      JWT_ISSUER: zk-xdr-graph
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Web Console - Next.js frontend
  console-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api-gateway

  # Risk Scoring - Computes asset trust scores from events
  risk-scoring:
    build:
      context: .
      dockerfile: services/risk-scoring/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/default"
    depends_on:
      - redis
      - clickhouse

  # Correlation Engine - Multi-signal incident correlation
  correlation-engine:
    build:
      context: .
      dockerfile: services/correlation-engine/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/default"
    depends_on:
      - redis
      - clickhouse

  # SOAR Playbook Engine - Automated response actions
  soar-playbook:
    build:
      context: .
      dockerfile: services/soar-playbook/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # Asset Graph - Builds Neo4j graph from events
  asset-graph:
    build:
      context: .
      dockerfile: services/asset-graph/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
    depends_on:
      - redis
      - neo4j

  # DDI Connector - DNS security events
  connector-ddi:
    build:
      context: .
      dockerfile: services/connectors/ddi/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # WAF Connector - Web application firewall events
  connector-waf:
    build:
      context: .
      dockerfile: services/connectors/waf/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # Mail Connector - Email security events
  connector-mail:
    build:
      context: .
      dockerfile: services/connectors/mail/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # CTI Lakehouse - Federated threat intelligence API
  cti-lakehouse:
    build:
      context: .
      dockerfile: services/cti-lakehouse/Dockerfile
    ports:
      - "8095:8095"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # CTI Matcher - IoC matching service (consumes XDR events)
  cti-matcher:
    build:
      context: .
      dockerfile: services/cti-lakehouse/Dockerfile.matcher
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  # Analyst Copilot - Python RAG/LLM service
  analyst-copilot:
    build:
      context: .
      dockerfile: services/analyst-copilot/Dockerfile
    ports:
      - "8090:8090"
    environment:
      OLLAMA_URL: http://ollama:11434
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    depends_on:
      - redis
      - qdrant

  # Ollama - Local LLM for analyst copilot
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Grafana - Observability dashboards
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  # Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.6
    ports:
      - "3100:3100"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  clickhouse_data:
  minio_data:
  qdrant_data:
  redpanda_data:
  ollama_data:
  grafana_data:
