name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go-core:
    name: Test Go (API Gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests with coverage
        working-directory: apps/api-gateway
        run: go test ./... -race -coverprofile=coverage.out -count=1
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-coverage
          path: apps/api-gateway/coverage.out

  test-go-risk-scoring:
    name: Test Go (Risk Scoring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        working-directory: services/risk-scoring
        run: go test ./internal/scoring/ -race -count=1

  test-go-correlation:
    name: Test Go (Correlation Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        working-directory: services/correlation-engine
        run: go test ./internal/rules/ -race -count=1

  test-go-detection:
    name: Test Go (Connectors Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        working-directory: services/connectors
        run: go test ./detection/ -race -count=1

  build-go-services:
    name: Build Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build all Go services
        run: |
          for svc in apps/api-gateway services/risk-scoring services/asset-graph services/correlation-engine services/soar-playbook services/connectors/ddi services/connectors/waf services/connectors/mail; do
            echo "Building $svc..."
            cd "$svc" && go build ./... && cd -
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/console-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/console-web
        run: npm ci
      - name: Lint
        working-directory: apps/console-web
        run: npm run lint

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/console-web/package-lock.json
      - name: Install dependencies
        working-directory: apps/console-web
        run: npm ci
      - name: Build
        working-directory: apps/console-web
        run: npx next build

  test-python-services:
    name: Test Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r tests/robot/requirements.txt
      - name: Syntax check CTI Lakehouse
        run: python -m py_compile services/cti-lakehouse/app/main.py || true
      - name: Syntax check Copilot
        run: python -m py_compile services/analyst-copilot/app/main.py || true

  test-rust:
    name: Test Rust (IoC Parsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        working-directory: services/ioc-parsers
        run: cargo test
      - name: Build
        working-directory: services/ioc-parsers
        run: cargo build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Gateway image
        run: docker build -f docker/Dockerfile.api -t zk-xdr-api .
      - name: Build Console Web image
        run: docker build -f docker/Dockerfile.web -t zk-xdr-web .
      - name: Build Event Normalizer image
        run: docker build -f services/event-normalizer/Dockerfile -t zk-xdr-normalizer .
